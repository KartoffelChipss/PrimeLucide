name: Build and Deploy PrimeLucide

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install latest lucide-static
        run: pnpm add lucide-static@latest

      - name: Get lucide version
        id: lucide_version
        run: |
          VERSION=$(pnpm view simple version)
          echo "version=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          VERSION=${{ steps.lucide_version.outputs.version }}
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q v$VERSION; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Exit if release already exists
        if: steps.check_tag.outputs.exists == 'true'
        run: |
          echo "Release alread exists. Exiting..."
          exit 0

      - name: Run build
        if: steps.check_tag.outputs.exists == 'false'
        run: pnpm run go

      - name: Verify artifact exists
        if: steps.check_tag.outputs.exists == 'false'
        run: ls -lah out/

      - name: Prepare Maven artifact layout
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.lucide_version.outputs.version }}

          mkdir -p staging/org/strassburger/prime-lucide/$VERSION

          cp out/PrimeLucide.jar \
            staging/org/strassburger/prime-lucide/$VERSION/prime-lucide-$VERSION.jar

          cat > staging/org/strassburger/prime-lucide/$VERSION/prime-lucide-$VERSION.pom <<EOF
          <project xmlns="http://maven.apache.org/POM/4.0.0">
            <modelVersion>4.0.0</modelVersion>
            <groupId>org.strassburger</groupId>
            <artifactId>prime-lucide</artifactId>
            <version>${VERSION}</version>
          </project>
          EOF

      - name: Deploy to Maven repository (Nginx)
        if: steps.check_tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.lucide_version.outputs.version }}
          DEPLOY_SSH_KEY: ${{ secrets.MAVEN_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.MAVEN_HOST }}
          DEPLOY_USER: ${{ secrets.MAVEN_USER }}
          TARGET_PATH: ${{ secrets.MAVEN_PATH }}
        run: |
          echo "$DEPLOY_SSH_KEY" > key.pem
          chmod 600 key.pem
          
          if ssh -i key.pem $DEPLOY_USER@$DEPLOY_HOST \
            "[ -d $TARGET_PATH/org/strassburger/prime-lucide/$VERSION ]"; then
            echo "Version already exists, skipping deploy"
            exit 0
          fi

          rsync -avz -e "ssh -i key.pem -o StrictHostKeyChecking=no" \
            staging/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$TARGET_PATH"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.lucide_version.outputs.version }}
          name: PrimeLucide v${{ steps.lucide_version.outputs.version }}
          generate_release_notes: false
          files: |
            out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}      
